input {
  beats {
    port => 5044
  }
}

filter {
  if [container][name] {
    mutate {
      add_field => { "service_name" => "%{[container][name]}" }
    }
  }

  # Parse standard HTTP / Flask / Node.js logs
  grok {
    match => { "message" => "(?:%{IPORHOST:client_ip} - - \[%{HTTPDATE:timestamp}\] \"%{WORD:http_method} %{NOTSPACE:request_path} HTTP/%{NUMBER:http_version}\" %{NUMBER:status_code:int} %{NUMBER:body_bytes_sent:int})|(?:%{GREEDYDATA:raw_log})" }
  }

  # Flag common attack signatures
  if [message] =~ /(?i)('|\b(select|union|insert|delete|drop|or 1=1)\b)/ {
    mutate { add_tag => [ "sqli_attempt" ] }
  }
  if [message] =~ /(?i)(<script>|javascript:|onerror=)/ {
    mutate { add_tag => [ "xss_attempt" ] }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logstash-docker-%{+YYYY.MM.dd}"
  }
}
